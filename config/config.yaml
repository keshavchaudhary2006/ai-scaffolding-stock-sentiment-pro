# Stock Sentiment Predictor - Configuration

data:
  default_ticker: AAPL
  default_period: 1y
  interval: 1d
  cache_dir: data/cache

api_keys:
  news_api: ${NEWS_API_KEY}
  gnews: ${GNEWS_KEY}
  finnhub: ${FINNHUB_KEY}

processing:
  clean_method: ffill
  min_rows: 30

sentiment:
  backend: vader
  finbert_model: ProsusAI/finbert
  batch_size: 32

features:
  forecast_horizon: 1
  sma_windows: [5, 10, 20, 50]
  rsi_period: 14
  lag_depths: [1, 2, 3, 5, 10]

model_training:
  default_model: xgboost
  val_size: 0.15
  test_size: 0.20
  random_state: 42

deep_learning:
  cell_type: lstm
  hidden_size: 128
  num_layers: 2
  seq_len: 20
  dropout: 0.3
  epochs: 50
  batch_size: 32
  lr: 0.001
